name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Demo runs with zero keys
        run: node dist/cli.js demo

  secret-scan:
    # Backstop against a secret ever landing in this public repo or its history.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: >
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest
          detect --source=/repo --redact --no-banner --exit-code 1
